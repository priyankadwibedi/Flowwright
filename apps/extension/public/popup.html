<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Flowwright capture</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Flowwright</h1>
      <p id="state">Capture is off.</p>
      <button id="toggle">Start capture</button
      ><button id="export">Export JSON</button>
      <p class="hint">
        Only safe element descriptions are captured. Password and sensitive
        fields are ignored.
      </p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
