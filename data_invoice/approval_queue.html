<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Approval Queue - Flowwright Demo</title><style>body{font-family:Arial,sans-serif;background:#f7f2e5;color:#111;margin:0}.card{max-width:720px;margin:50px auto;background:#fff;border:2px solid #111;padding:36px;box-shadow:8px 8px 0 #111}.badge{display:inline-block;background:#efc84a;border:1px solid #111;padding:7px 10px;font-size:12px;font-weight:700}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:24px 0}.field{border:1px solid #c9c2b2;padding:14px}.label{font-size:11px;color:#666;font-weight:700}.value{font-size:18px;font-weight:700;margin-top:5px}.actions{display:flex;gap:12px;flex-wrap:wrap}button{padding:13px 18px;border:2px solid #111;background:#efc84a;font-size:16px;font-weight:700;cursor:pointer}button.secondary{background:#fff}.status{margin-top:22px;padding:14px;border:1px solid #111;background:#faf8f1}@media(max-width:650px){.card{margin:0;border:0;box-shadow:none}.grid{grid-template-columns:1fr}}</style></head><body><main class="card"><span class="badge">SYNTHETIC DEMO</span><h1>Invoice approval queue</h1><div class="grid"><div class="field"><div class="label">INVOICE</div><div class="value">INV-1042</div></div><div class="field"><div class="label">PURCHASE ORDER</div><div class="value">PO-8891</div></div><div class="field"><div class="label">AMOUNT</div><div class="value">$8,320.00 USD</div></div><div class="field"><div class="label">STATUS</div><div class="value">Pending review</div></div></div><div class="actions"><button id="approve" type="button">Prepare approval</button><button id="flag" class="secondary" type="button">Flag exception</button></div><div id="status" class="status" aria-live="polite">No action taken. Final approval always requires a person.</div></main><script>const s=document.getElementById('status');document.getElementById('approve').addEventListener('click',()=>s.textContent='Prepared for human approval. No final action was executed.');document.getElementById('flag').addEventListener('click',()=>s.textContent='Exception flagged for human review.');</script></body></html>
