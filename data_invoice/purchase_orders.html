<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Purchase Orders - Flowwright Demo</title>
<style>body{font-family:Arial,sans-serif;margin:0;background:#f7f2e5;color:#111}.wrap{max-width:1000px;margin:40px auto;background:#fff;border:2px solid #111;padding:36px;box-shadow:8px 8px 0 #111}h1{margin-top:0}.badge{display:inline-block;background:#efc84a;border:1px solid #111;padding:7px 10px;font-size:12px;font-weight:700}.search{margin:24px 0}.search input{width:100%;padding:14px;border:1px solid #111;font-size:17px}table{width:100%;border-collapse:collapse}th{background:#111;color:#fff;text-align:left;padding:12px}td{padding:14px;border:1px solid #c9c2b2}.open{font-weight:700;color:#111}@media(max-width:700px){.wrap{margin:0;border:0;box-shadow:none;padding:20px;overflow:auto}}</style></head>
<body><main class="wrap"><span class="badge">SYNTHETIC DEMO DATA</span><h1>Purchase-order database</h1><p>Search by purchase-order number.</p><div class="search"><input id="q" value="" placeholder="Search purchase orders" aria-label="Search purchase orders"></div>
<table><thead><tr><th>Purchase order</th><th>Supplier</th><th>Total</th><th>Currency</th><th>Status</th></tr></thead><tbody id="rows">
<tr><td><a class="open" href="#po-8890">PO-8890</a></td><td>Northstar Office</td><td>$2,400.00</td><td>USD</td><td>Open</td></tr>
<tr><td><a class="open" href="#po-8891">PO-8891</a></td><td>Acme Supplies</td><td>$8,320.00</td><td>USD</td><td>Open</td></tr>
<tr><td><a class="open" href="#po-8892">PO-8892</a></td><td>Vertex Systems</td><td>$7,950.00</td><td>USD</td><td>Open</td></tr>
</tbody></table></main>
<script>const q=document.getElementById('q');q.addEventListener('input',()=>{const term=q.value.toLowerCase();document.querySelectorAll('#rows tr').forEach(r=>r.hidden=!r.textContent.toLowerCase().includes(term));});</script></body></html>
